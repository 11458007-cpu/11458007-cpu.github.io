<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇苡樂 | SU YI LE - 作品集主頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111111;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ff3e00;
            --green-gradient: linear-gradient(135deg, #a7f3d0 0%, #34d399 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* 頂部標題 */
        .main-header {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
        }

        /* 作品集區域 */
        .portfolio-grid {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .portfolio-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .portfolio-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .card-image {
            height: 120px;
            width: 100%;
            background: var(--green-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card-image-pattern {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card-title { font-size: 1.5rem; font-weight: 900; color: var(--text-primary); }
        .card-desc { font-size: 0.95rem; line-height: 1.6; color: var(--text-secondary); }
    </style>
</head>
<body>

    <header class="main-header">蘇苡樂的 GitHub 作品集</header>

    <div class="portfolio-grid">
        <a href="game-info.html" class="portfolio-card">
            <div class="card-image">
                <div class="card-image-pattern"></div>
            </div>
            <div class="card-content">
                <div class="card-title">遊戲專案合輯：貪食蛇 & 打地鼠</div>
                <div class="card-desc">探索兩個經典像素遊戲的互動詳情。</div>
            </div>
        </a>
    </div>

</body>
</html>
